<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YoDarren Activity</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 700px;
      text-align: center;
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    button:hover {
      background: #4752c4;
    }

    .box {
      margin-top: 15px;
    }

    iframe {
      width: 100%;
      height: 360px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      display: none; /* hidden by default */
    }

    .warning {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>YoDarren Activity</h1>
    <p>Video Launcher (Discord-safe)</p>

    <!-- BUTTON (always works in Discord) -->
    <button onclick="openVideo()">Open YouTube Video</button>

    <!-- OPTIONAL EMBED (only works in browser, not Discord) -->
    <div class="box">
      <iframe id="videoFrame"
        src="https://www.youtube.com/embed/5c5eXSArn28?rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <p class="warning">
      If embed is blank in Discord Activity, that is a platform restriction (not your code).
    </p>
  </div>

  <script>
    const URL = "https://youtu.be/5c5eXSArn28?si=Hwt8ixvI_rxeGYc8";

    function openVideo() {
      // BEST METHOD for Discord Activities
      try {
        window.location.href = URL;
      } catch (e) {
        // fallback
        window.open(URL, "_blank");
      }
    }

    // Try to detect if embed is allowed (browser only)
    window.onload = () => {
      const frame = document.getElementById("videoFrame");

      // Show iframe only if NOT in Discord environment
      const isDiscord = navigator.userAgent.toLowerCase().includes("discord");

      if (!isDiscord) {
        frame.style.display = "block";
      }
    };
  </script>

</body>
</html>
