<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YoDarren Activity</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 20px;
      background: #1a1a2e;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #4752c4;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>YoDarren Activity</h1>
    <p>Click below to open the video</p>

    <button onclick="openVideo()">Open Link</button>

    <p class="small">If blocked, it will redirect automatically.</p>
  </div>

  <script>
    const TARGET_URL = "https://youtu.be/5c5eXSArn28?si=Hwt8ixvI_rxeGYc8";

    function openVideo() {
      // safest Discord + browser method
      const win = window.open(TARGET_URL, "_blank");

      // fallback if popup blocked
      if (!win) {
        window.location.href = TARGET_URL;
      }
    }

    // debug check (fixes "white screen confusion")
    console.log("YoDarren Activity loaded successfully");
  </script>

</body>
</html>
