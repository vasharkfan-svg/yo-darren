<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #0f0f1a;
      color: white;
      font-family: Arial;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .box {
      text-align: center;
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4752c4;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>YoDarren Activity</h2>
    <p>Open the video in a new tab</p>

    <button onclick="openVideo()">
      Open YouTube Video
    </button>
  </div>

  <script>
    const url = "https://youtu.be/5c5eXSArn28?si=Hwt8ixvI_rxeGYc8";

    function openVideo() {
      window.location.href = url;
    }
  </script>
</body>
</html>
